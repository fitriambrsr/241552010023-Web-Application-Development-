<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing</title>
  <link rel="stylesheet" href="pricing.css">
</head>
<body>

<div class="pricing">
  <div class="card">
    <h2>Basic</h2>
    <p class="price">Rp10.000</p>
    <p>1 Website</p>
    <p>Email Support</p>
    <button>Choose</button>
  </div>

  <div class="card popular">
    <h2>Pro</h2>
    <p class="price">Rp10.000</p>
    <p>5 Websites</p>
    <p>Priority Support</p>
    <button>Choose</button>
  </div>

  <div class="card">
    <h2>Enterprise</h2>
    <p class="price">Rp10.000</p>
    <p>Unlimited</p>
    <p>24/7 Support</p>
    <button>Choose</button>
  </div>
</div>

</body>
</html>
